    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet" />

    <script src="js/config.local.js?v=1.0.0"></script>
    <script src="js/products/core/base.js?v=1.0.0"></script>
    <script src="js/products/hairdresser/profile.js?v=1.0.0"></script>
    <script src="js/products/tradie/profile.js?v=1.0.0"></script>
    <script src="js/productConfig.js?v=1.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js?v=1.0.0"></script>
    <script>
    (function(){
      var cfg = window.ProductConfig || {};
      var useSupabase = !!cfg.useSupabase && !!window.SupabaseClient;
      var moduleName = 'db';
      if (useSupabase) {
        moduleName = cfg.activeProduct === 'hairdresser' ? 'db-supabase' : 'dbSupabase';
      }
      document.write('<script src="js/' + moduleName + '.js?v=1.0.6"><\/script>');
    })();
    </script>
    <script src="js/storageDriver.js?v=1.0.0"></script>
    <script src="js/app.js?v=1.0.5"></script>
